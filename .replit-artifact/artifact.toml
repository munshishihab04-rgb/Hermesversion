kind = "web"
previewPath = "/"
title = "Licenvo"
version = "1.0.0"
id = "artifacts/licenvo"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25948

[services.development]
run = "pnpm --filter @workspace/licenvo run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/licenvo", "run", "build" ]
publicDir = "artifacts/licenvo/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25948"
BASE_PATH = "/"
